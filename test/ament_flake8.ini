[flake8]
extend-ignore = B902,C816,D100,D101,D102,D103,D104,D105,D106,D107,D203,D212,D404,I202
import-order-style = google
max-line-length = 99
show-source = true
statistics = true

# The sandbox used in some CI / container environments restricts process-level
# semaphores; flake8's parallel mode can fail to initialize there.
jobs = 1
