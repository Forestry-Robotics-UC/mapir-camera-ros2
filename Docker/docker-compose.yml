services:
  mapir_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /mnt/bumble/work_utils/mapir_camera:/workspaces/ros2_ws/src/mapir_camera:ro
    devices:
      - /dev/video0:/dev/video0
    stdin_open: true
    tty: true
    command: >-
      bash -lc "set -e
      && source /opt/ros/jazzy/setup.bash
      && cd /workspaces/ros2_ws
      && colcon build --symlink-install --base-paths src/mapir_camera --packages-select mapir_camera_ros2
      && source install/setup.bash
      && exec ros2 launch mapir_camera_ros2 mapir_camera.launch.py
      camera_impl:=cpp
      enable_indices:=true
      indices_params_file:=/workspaces/ros2_ws/src/mapir_camera/config/mapir_indices_ocn_params.yaml"

  rviz_with_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - LIBGL_ALWAYS_SOFTWARE=1
    volumes:
      - /mnt/bumble/work_utils/mapir_camera:/workspaces/ros2_ws/src/mapir_camera:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    devices:
      - /dev/video0:/dev/video0
    stdin_open: true
    tty: true
    command: >-
      bash -lc "set -e
      && source /opt/ros/jazzy/setup.bash
      && cd /workspaces/ros2_ws
      && colcon build --symlink-install --base-paths src/mapir_camera --packages-select mapir_camera_ros2
      && source install/setup.bash
      && ros2 launch mapir_camera_ros2 mapir_camera.launch.py
      camera_impl:=cpp
      enable_indices:=true
      indices_params_file:=/workspaces/ros2_ws/src/mapir_camera/config/mapir_indices_ocn_params.yaml &
      exec rviz2 -d /workspaces/ros2_ws/src/mapir_camera/config/rviz_mapir_indices.rviz"
