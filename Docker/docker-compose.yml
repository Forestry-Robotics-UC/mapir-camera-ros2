services:
  mapir_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
      - ${MAPIR_METADATA_DEVICE:-/dev/video1}:${MAPIR_METADATA_DEVICE:-/dev/video1}
    stdin_open: true
    tty: true
    command:
      - python3
      - -m
      - mapir_camera_ros2.camera_node
      - --ros-args
      - -r
      - __ns:=/${MAPIR_NAMESPACE:-mapir}
      - --params-file
      - /workspaces/ros2_ws/src/mapir_camera/config/mapir_camera_params.yaml

  rviz_with_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - LIBGL_ALWAYS_SOFTWARE=1
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - /home/forestsphere/work_utils/curt_dataset_recorder/ros2_ws/curt_description/meshes:/opt/curt_description_meshes:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
      - ${MAPIR_METADATA_DEVICE:-/dev/video1}:${MAPIR_METADATA_DEVICE:-/dev/video1}
    stdin_open: true
    tty: true
    depends_on:
      - mapir_camera
      - mapir_robot_description
    command:
      - rviz2
      - -d
      - /workspaces/ros2_ws/src/mapir_camera/config/rviz_mapir_indices.rviz

  mapir_robot_description:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - /home/forestsphere/work_utils/curt_dataset_recorder/ros2_ws/curt_description/meshes:/opt/curt_description_meshes:ro
    command:
      - ros2
      - launch
      - /workspaces/ros2_ws/src/mapir_camera/launch/mapir_survey3_description.launch.py
      - urdf_file:=/workspaces/ros2_ws/src/mapir_camera/config/mapir_survey3_visual.urdf

  camera_calibration:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
    volumes:
      - ${MAPIR_OUTPUT_DIR:-../outputs}:/outputs
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
    depends_on:
      - mapir_camera
    stdin_open: true
    tty: true
    working_dir: /outputs
    command:
      - ros2
      - run
      - camera_calibration
      - cameracalibrator
      - --size
      - ${MAPIR_CAL_PATTERN_COLS:-9}x${MAPIR_CAL_PATTERN_ROWS:-6}
      - --square
      - ${MAPIR_CAL_SQUARE_M:-0.024}
      - --no-service-check
      - --ros-args
      - -r
      - image:=/${MAPIR_NAMESPACE:-mapir}/image_raw
      - -r
      - camera:=/${MAPIR_NAMESPACE:-mapir}

  vignette_calibration:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - ${MAPIR_OUTPUT_DIR:-../outputs}:/outputs
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
    stdin_open: true
    tty: true
    command:
      - python3
      - /workspaces/ros2_ws/src/mapir_camera/tools/vignette_calibration.py
      - --video-device
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}
      - --pixel-format
      - ${MAPIR_VIG_PIXEL_FORMAT:-MJPG}
      - --width
      - ${MAPIR_VIG_WIDTH:-1280}
      - --height
      - ${MAPIR_VIG_HEIGHT:-720}
      - --fps
      - ${MAPIR_VIG_FPS:-30}
      - --frames
      - ${MAPIR_VIG_FRAMES:-80}
      - --warmup-frames
      - ${MAPIR_VIG_WARMUP:-20}
      - --blur-kernel
      - ${MAPIR_VIG_BLUR_KERNEL:-41}
      - --epsilon
      - ${MAPIR_VIG_EPSILON:-0.001}
      - --out-dir
      - /outputs/vignette_calibration

  reflectance_calibration:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - ${MAPIR_OUTPUT_DIR:-../outputs}:/outputs
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
    stdin_open: true
    tty: true
    command:
      - python3
      - /workspaces/ros2_ws/src/mapir_camera/tools/reflectance_calibration.py
      - --calibration-image
      - /outputs/reflectance_calibration/calibration_target.png
      - --panel-config
      - /workspaces/ros2_ws/src/mapir_camera/config/reflectance_panels.example.json
      - --apply-dir
      - /outputs/reflectance_calibration/input
      - --glob
      - "*.png"
      - --out-dir
      - /outputs/reflectance_calibration
