services:
  mapir_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /mnt/bumble/work_utils/mapir_camera:/workspaces/ros2_ws/src/mapir_camera:ro
    devices:
      - /dev/video0:/dev/video0
    stdin_open: true
    tty: true
    command: >-
      bash -lc "source /opt/ros/jazzy/setup.bash
      && cd /workspaces/ros2_ws
      && colcon build --symlink-install
      && source install/setup.bash
      && exec bash"
  mapir_camera_cpp:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
    volumes:
      - /mnt/bumble/work_utils/mapir_camera:/workspaces/ros2_ws/src/mapir_camera:ro
    devices:
      - /dev/video0:/dev/video0
    stdin_open: true
    tty: true
    command: >-
      bash -lc "source /opt/ros/jazzy/setup.bash
      && cd /workspaces/ros2_ws
      && colcon build --symlink-install --packages-select mapir_camera_cpp --base-paths src/mapir_camera/mapir_camera_cpp
      && source install/setup.bash
      && ros2 run mapir_camera_cpp camera_node_cpp --ros-args --remap __ns:=/mapir"
