services:
  mapir_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/mapir}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
      - ${MAPIR_METADATA_DEVICE:-/dev/mapir_meta}:${MAPIR_METADATA_DEVICE:-/dev/video1}
    stdin_open: true
    tty: true
    command:
      - python3
      - -m
      - mapir_camera_ros2.camera_node
      - --ros-args
      - -r
      - __ns:=/${MAPIR_NAMESPACE:-mapir}
      - --params-file
      - ${MAPIR_CAMERA_PARAMS_FILE:-/workspaces/ros2_ws/src/mapir_camera/config/mapir_camera_params.yaml}
      - -p
      - video_device:=${MAPIR_VIDEO_DEVICE:-/dev/video0}
      - -p
      - metadata_device:=${MAPIR_METADATA_DEVICE:-/dev/video1}

  rviz_with_camera:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - LIBGL_ALWAYS_SOFTWARE=1
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - /home/forestsphere/work_utils/curt_dataset_recorder/ros2_ws/curt_description/meshes:/opt/curt_description_meshes:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
      - ${MAPIR_METADATA_DEVICE:-/dev/video1}:${MAPIR_METADATA_DEVICE:-/dev/video1}
    stdin_open: true
    tty: true
    depends_on:
      - mapir_camera
      - mapir_robot_description
    command:
      - rviz2
      - -d
      - /workspaces/ros2_ws/src/mapir_camera/config/rviz_mapir_indices.rviz

  mapir_robot_description:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - /home/forestsphere/work_utils/curt_dataset_recorder/ros2_ws/curt_description/meshes:/opt/curt_description_meshes:ro
    command:
      - ros2
      - launch
      - /workspaces/ros2_ws/src/mapir_camera/launch/mapir_survey3_description.launch.py
      - urdf_file:=/workspaces/ros2_ws/src/mapir_camera/config/mapir_survey3_visual.urdf

  camera_calibration:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - LIBGL_ALWAYS_SOFTWARE=${LIBGL_ALWAYS_SOFTWARE:-1}
    volumes:
      - ../config/calibration_files/instrinsics:/outputs
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/video0}:${MAPIR_VIDEO_DEVICE:-/dev/video0}
    depends_on:
      - mapir_camera
    stdin_open: true
    tty: true
    working_dir: /outputs
    command:
      - /bin/bash
      - -lc
      - >
        set -e;
        stamp="$${MAPIR_CAL_RUN_TAG:-$$(date +%Y_%m%d_%H%M%S)}";
        purpose="$${MAPIR_INTRINSICS_PURPOSE:-instrinsics}";
        out_dir="/outputs/$${stamp}__$${purpose}";
        mkdir -p "$${out_dir}";
        ros2 run camera_calibration cameracalibrator
        --size ${MAPIR_CAL_PATTERN_COLS:-10}x${MAPIR_CAL_PATTERN_ROWS:-7}
        --square ${MAPIR_CAL_SQUARE_M:-0.025}
        --no-service-check
        --ros-args
        -r image:=/${MAPIR_NAMESPACE:-mapir}/image_raw
        -r camera:=/${MAPIR_NAMESPACE:-mapir};
        if [ -f /tmp/calibrationdata.tar.gz ]; then
          cp /tmp/calibrationdata.tar.gz "$${out_dir}/calibrationdata.tar.gz";
          tar -xzf /tmp/calibrationdata.tar.gz -C "$${out_dir}" || true;
        fi;
        ln -sfn "$$(basename "$${out_dir}")" /outputs/latest

  vignette_calibration:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - ../config/calibration_files/vignette:/outputs/vignette_calibration
    devices:
      - ${MAPIR_VIDEO_DEVICE:-/dev/mapir}:/dev/video0
    stdin_open: true
    tty: true
    command:
      - /bin/bash
      - -lc
      - >
        set -e;
        stamp="$${MAPIR_CAL_RUN_TAG:-$$(date +%Y_%m%d_%H%M%S)}";
        purpose="$${MAPIR_VIGNETTE_PURPOSE:-vignette}";
        out_dir="/outputs/vignette_calibration/$${stamp}__$${purpose}";
        mkdir -p "$${out_dir}";
        python3 /workspaces/ros2_ws/src/mapir_camera/tools/vignette_calibration.py
        --video-device ${MAPIR_VIG_VIDEO_DEVICE:-/dev/video0}
        --pixel-format ${MAPIR_VIG_PIXEL_FORMAT:-MJPG}
        --width ${MAPIR_VIG_WIDTH:-1280}
        --height ${MAPIR_VIG_HEIGHT:-720}
        --fps ${MAPIR_VIG_FPS:-30}
        --frames ${MAPIR_VIG_FRAMES:-80}
        --warmup-frames ${MAPIR_VIG_WARMUP:-20}
        --blur-kernel ${MAPIR_VIG_BLUR_KERNEL:-41}
        --epsilon ${MAPIR_VIG_EPSILON:-0.001}
        --out-dir "$${out_dir}";
        ln -sfn "$$(basename "$${out_dir}")" /outputs/vignette_calibration/latest

  reflectance_calibration:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - LIBGL_ALWAYS_SOFTWARE=${LIBGL_ALWAYS_SOFTWARE:-1}
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - ../config/calibration_files/reflection:/outputs/reflectance_calibration
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    stdin_open: true
    tty: true
    entrypoint:
      - /bin/bash
      - /workspaces/ros2_ws/src/mapir_camera/Docker/reflectance_calibration_entrypoint.sh

  roi_selector:
    build:
      context: .
      dockerfile: Dockerfile
    image: mapir_camera_ros2:jazzy
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=${XAUTHORITY:-$HOME/.Xauthority}
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      - PYTHONPATH=/workspaces/ros2_ws/src/mapir_camera
      - MPLBACKEND=TkAgg
    volumes:
      - /home/forestsphere/work_utils/mapir-camera-ros2:/workspaces/ros2_ws/src/mapir_camera:ro
      - ../config/calibration_files/reflection:/outputs/reflectance_calibration
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    stdin_open: true
    tty: true
    command:
      - python3
      - /workspaces/ros2_ws/src/mapir_camera/tools/matplotlib_roi_selector.py
