# Parameters for mapir_camera_ros2 indices_node when using a Survey3W OCN camera.
#
# OCN provides Cyan / Orange / NIR1. This preset aliases:
#   - Cyan  -> Blue
#   - Orange -> Red
#
# Indices requiring Green or RedEdge will be skipped unless you provide those
# bands via explicit *_channel overrides.

# ROS 2 YAML parameter files are matched by node name. Using `/**` makes this
# file apply regardless of node renaming (e.g., launch files).

/**:
  ros__parameters:
    # Debug
    debug: false
    debug_period_s: 1.0

    # Runtime toggle
    enabled: true

    # IO
    image_topic: image_raw

    # Recommended indices for OCN (Cyan/Orange/NIR1).
    #[ndvi, evi, osavi, savi, wdrvi, msavi2, gemi, rdvi, tdvi, nli, mnli]
    indices: [ndvi, osavi]
    filter_set: OCN

    # Performance
    normalize_input: true
    downsample_factor: 1
    publish_every_n: 1

    # Optional colorized output (BGR8)
    publish_color: true
    colormap: viridis  # e.g., viridis, jet, gray, custom
    colorize_min: -1.0
    colorize_max: 1.0
    custom_colormap: ''  # 'value,r,g,b; value,r,g,b; ...' (used when colormap=custom)

    # Index constants
    eps: 1.0e-6
    gari_gamma: 1.7
    wdrvi_alpha: 0.2
    mnli_L: 0.5

    # QoS
    qos_best_effort: true
    qos_depth: 5

    # Optional explicit overrides (0=B, 1=G, 2=R). Set to -1 to leave unset.
    blue_channel: -1
    green_channel: -1
    red_channel: -1
    rededge_channel: -1
    nir_channel: -1
    nir1_channel: -1
    nir2_channel: -1
    cyan_channel: -1
    orange_channel: -1
