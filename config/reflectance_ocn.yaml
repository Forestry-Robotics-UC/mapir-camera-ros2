/**:
  ros__parameters:
    # Common (most users)
    enable: true
    input_topic: "image_raw"
    output_topic: "image_rect"
    # preview_topic: "image_reflectance_preview"
    camera_info_topic: "camera_info"
    rectify_output: true
    calibration_mode: "continuous"  # "once" | "continuous"
    recalibration_interval_s: 2.0
    detect_rate_hz: 10.0
    detect_downscale: 0.5
    debug: True
    debug_period_s: 1.0
    # reflectance values per patch (top-left, top-right, bottom-left, bottom-right)
    patch_reflectances: [0.10, 0.20, 0.50, 0.90]

    # Target layout (fiducial + 2x2 panel)
    detection_mode: "fiducial"      # "fiducial" | "manual"
    fiducial_type: "aruco"
    aruco_detector: "opencv"        # "legacy" | "opencv" | "auto"
    fiducial_id: -1               # -1 selects the largest detected marker
    panel_side: "left"              # left/right auto-select based on valid patches

    # Advanced (optional)
    debug_topic: "reflectance/debug"
    # status_topic: "reflectance/status"
    # recalibration_interval_s: 5.0
    # detect_rate_hz: 5.0
    # detect_downscale: 0.5          # <1.0 downsamples for fiducial detection
    # min_target_area_px: 5000
    # model: "linear"
    # clamp_min: 0.0
    # clamp_max: 1.2
    aruco_dictionary: "auto"        # "auto" tries common dictionaries
    # panel_scale_w: 1.00            # panel width in multiples of fiducial width
    # panel_scale_h: 1.00            # panel height in multiples of fiducial height
    # panel_gap_scale: 0.10          # gap between fiducial and panel as multiple of fiducial width
    # patch_grid: [2, 2]
    # patch_inset_ratio: 0.20        # ignore borders when sampling patch
    # patch_stat: "median"           # mean | median | trimmed_mean
    # patch_warp_size: 32            # perspective warp size for patch stats
    # patch_trim_ratio: 0.10         # trimmed_mean ratio (0-0.49)
    # patch_reflectances: [[0.10,0.10,0.10], [0.20,0.20,0.20], [0.50,0.50,0.50], [0.90,0.90,0.90]]
    # Calibration should match the live stream domain (MJPG/H264).
    # Use tools/calibrate_reflectance_from_raw.py on a captured frame.
    # initial_slopes: [0.01, 0.01, 0.01]
    # initial_intercepts: [0.0, 0.0, 0.0]
    # publish_debug_overlay: true
